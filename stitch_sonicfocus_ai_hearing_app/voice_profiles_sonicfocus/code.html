<script>
        // Micro-interaction: Waveform Animation
        function animateWaveforms() {
            const bars = document.querySelectorAll('.waveform-bar');
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 80) + 20;
                bar.style.height = `${randomHeight}%`;
            });
        }

        // Periodically animate bars for a "living" UI feel
        setInterval(animateWaveforms, 1200);

        // Hover intensity effect on glass cards
        document.querySelectorAll('.glass-panel').forEach(panel => {
            panel.addEventListener('mousemove', (e) => {
                const rect = panel.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                panel.style.setProperty('--mouse-x', `${x}px`);
                panel.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
