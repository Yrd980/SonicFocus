<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SonicFocus - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 0.6; }
        }

        @keyframes wave-pulse {
            0% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(1.8); opacity: 1; }
            100% { transform: scaleY(1); opacity: 0.5; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-border {
            border: 1px solid transparent;
            background: linear-gradient(#131314, #131314) padding-box,
                        linear-gradient(to bottom right, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02)) border-box;
        }

        .glow-effect {
            box-shadow: 0 0 20px rgba(173, 198, 255, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#004395",
                        "tertiary-container": "#00a572",
                        "tertiary-fixed": "#6ffbbe",
                        "error": "#ffb4ab",
                        "tertiary": "#4edea3",
                        "outline-variant": "#424754",
                        "on-secondary": "#3c0091",
                        "on-primary-fixed": "#001a42",
                        "inverse-primary": "#005ac2",
                        "primary-container": "#4d8eff",
                        "on-secondary-container": "#c4abff",
                        "on-surface-variant": "#c2c6d6",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e5e2e3",
                        "primary": "#adc6ff",
                        "secondary": "#d0bcff",
                        "surface-container-high": "#2a2a2b",
                        "on-tertiary": "#003824",
                        "background": "#131314",
                        "on-tertiary-fixed": "#002113",
                        "surface-variant": "#353436",
                        "surface-dim": "#131314",
                        "on-primary-container": "#00285d",
                        "on-secondary-fixed-variant": "#5516be",
                        "tertiary-fixed-dim": "#4edea3",
                        "primary-fixed": "#d8e2ff",
                        "on-primary": "#002e6a",
                        "surface-tint": "#adc6ff",
                        "secondary-container": "#571bc1",
                        "outline": "#8c909f",
                        "inverse-on-surface": "#313031",
                        "surface-container-lowest": "#0e0e0f",
                        "on-tertiary-fixed-variant": "#005236",
                        "secondary-fixed-dim": "#d0bcff",
                        "on-secondary-fixed": "#23005c",
                        "on-error": "#690005",
                        "surface-bright": "#3a393a",
                        "primary-fixed-dim": "#adc6ff",
                        "secondary-fixed": "#e9ddff",
                        "on-surface": "#e5e2e3",
                        "surface-container-low": "#1c1b1c",
                        "error-container": "#93000a",
                        "surface-container": "#201f20",
                        "on-tertiary-container": "#00311f",
                        "surface": "#131314",
                        "on-background": "#e5e2e3",
                        "surface-container-highest": "#353436"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "section-gap": "64px",
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "40px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-md": ["Geist"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "mono-technical": ["Geist"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "mono-technical": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary/30 overflow-hidden">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px] animate-[float_10s_infinite_ease-in-out]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/10 rounded-full blur-[120px] animate-[float_15s_infinite_ease-in-out_reverse]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-container-padding-mobile md:px-container-padding-desktop">
<!-- Header Section -->
<header class="text-center mb-12">
<div class="flex items-center justify-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="graphic_eq">graphic_eq</span>
<h1 class="font-display-lg text-display-lg bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent tracking-tighter">
                    SonicFocus
                </h1>
</div>
<p class="font-body-md text-on-surface-variant/80 max-w-[280px] mx-auto opacity-0 animate-[fadeIn_1s_ease-out_0.5s_forwards]">
                Focus on the voice that matters.
            </p>
</header>
<!-- Central Visualizer (The Audio Beam) -->
<div class="relative w-full max-w-lg aspect-square flex items-center justify-center mb-16">
<!-- Glassmorphic Orbit Rings -->
<div class="absolute inset-0 border border-white/5 rounded-full glass-panel opacity-20 scale-100"></div>
<div class="absolute inset-8 border border-white/10 rounded-full glass-panel opacity-40 scale-95"></div>
<div class="absolute inset-16 border border-white/20 rounded-full glass-panel opacity-60 scale-90"></div>
<!-- Waveform Animation Container -->
<div class="flex items-end justify-center gap-1.5 h-32 md:h-48" id="waveform">
<!-- Bars will be injected by JS -->
</div>
<!-- Central Glow Core -->
<div class="absolute w-24 h-24 bg-primary/20 rounded-full blur-[40px] animate-pulse"></div>
</div>
<!-- CTA Action Area -->
<div class="flex flex-col items-center gap-6 w-full max-w-xs">
<button class="group relative w-full py-4 px-8 rounded-xl font-label-md text-label-md bg-gradient-to-r from-on-primary-fixed-variant to-secondary-container text-white overflow-hidden transition-all duration-300 active:scale-95 glow-effect">
<span class="relative z-10 flex items-center justify-center gap-2">
                    Start Listening
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
</button>
<button class="w-full py-4 px-8 rounded-xl font-label-md text-label-md border border-white/10 glass-panel text-on-surface-variant hover:text-white hover:bg-white/5 transition-all duration-300">
                Explore Features
            </button>
</div>
<!-- Footer Meta -->
<footer class="mt-16 opacity-40">
<p class="font-mono-technical text-mono-technical tracking-widest uppercase">
                High Fidelity Audio Engine v2.4.0
            </p>
</footer>
</main>
<!-- Background Decoration: Glass Cards -->
<div class="fixed top-20 right-[-10%] w-64 h-80 rounded-3xl gradient-border glass-panel rotate-12 hidden lg:block opacity-50"></div>
<div class="fixed bottom-20 left-[-10%] w-64 h-80 rounded-3xl gradient-border glass-panel -rotate-12 hidden lg:block opacity-50"></div>
<script>
        // Generate Dynamic Waveform Bars
        const waveformContainer = document.getElementById('waveform');
        const barCount = 32;

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'w-1 md:w-2 bg-gradient-to-t from-primary to-secondary rounded-full';
            
            // Randomize initial height and animation delay
            const height = 20 + Math.random() * 60;
            const duration = 0.8 + Math.random() * 1.5;
            const delay = Math.random() * 2;
            
            bar.style.height = `${height}%`;
            bar.style.animation = `wave-pulse ${duration}s infinite ease-in-out ${delay}s`;
            
            waveformContainer.appendChild(bar);
        }

        // Add some subtle mouse parallax to the visualizer
        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const xPos = (clientX / window.innerWidth - 0.5) * 20;
            const yPos = (clientY / window.innerHeight - 0.5) * 20;
            
            waveformContainer.style.transform = `translate(${xPos}px, ${yPos}px)`;
        });
    </script>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body></html>
