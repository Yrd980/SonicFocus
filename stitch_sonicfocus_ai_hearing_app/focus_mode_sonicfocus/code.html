<script>
        // Waveform Animation Logic
        const container = document.getElementById('waveform-container');
        const barCount = 60;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-[3px] md:w-[4px] bg-primary rounded-full opacity-60';
            const height = Math.random() * 80 + 10;
            bar.style.height = `${height}%`;
            container.appendChild(bar);
            bars.push(bar);
        }

        function animateWaveform() {
            bars.forEach(bar => {
                const randomHeight = Math.random() * 70 + 15;
                bar.style.height = `${randomHeight}%`;
                bar.style.opacity = (randomHeight / 100) + 0.2;
            });
            requestAnimationFrame(() => {
                setTimeout(animateWaveform, 100);
            });
        }
        animateWaveform();

        // Slider Interaction
        const slider = document.getElementById('focus-slider');
        const label = document.getElementById('strength-label');
        const labels = ['Low', 'Medium', 'High'];
        
        slider.addEventListener('input', (e) => {
            label.textContent = labels[e.target.value];
        });
    </script>
